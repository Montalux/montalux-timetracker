<!DOCTYPE html>
<html lang="de" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Montalux Timetracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="min-h-screen bg-base-200">

    <div class="navbar bg-base-100 shadow-sm">
        <div class="navbar-start">
            <a href="{{ url_for('index') }}" class="btn btn-ghost text-xl">Montalux Timetracker</a>
        </div>
        <div class="navbar-center">
            <ul class="menu menu-horizontal px-1 gap-1">
                <li><a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Buchen</a></li>
                <li><a href="{{ url_for('entries') }}" class="{% if request.endpoint == 'entries' %}active{% endif %}">Übersicht</a></li>
                <li><a href="{{ url_for('admin') }}" class="{% if request.endpoint == 'admin' %}active{% endif %}">Verwaltung</a></li>
            </ul>
        </div>
        <div class="navbar-end"></div>
    </div>

    <main class="container mx-auto px-4 py-6 max-w-5xl">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert {{ 'alert-success' if category == 'success' else 'alert-error' }} mb-4">
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

</body>
</html>
